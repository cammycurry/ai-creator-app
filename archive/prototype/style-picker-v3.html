    }
    .m-logo {

    .m-creators { flex: 1; padding: 10px; }
    .m-cr {

    }

      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; transition: all 300ms;
    }
    .m-cr-meta { font-size: 10px; opacity: 0.5; }
    .m-nav { border-top: 1px solid; padding: 10px; transition: all 300ms; }
    .m-nav-i {

    .m-main { flex: 1; display: flex; flex-direction: column; transition: all 300ms; }

    .m-msg {

      max-width: 340px; margin-bottom: 10px; line-height: 1.5;
      transition: all 300ms;
    }

    .m-img { width: 65px; height: 82px; border-radius: 6px; }
    .m-acts { display: flex; gap: 5px; margin-top: 8px; }
    .m-act {

function buildMockup(t) {
  return `
    <div class="m-side" style="background:${t.side};border-color:${t.sideBdr}">

        Creator App
      </div>
      <div class="m-creators">
        <div class="m-cr" style="background:${t.crAct};color:${t.crActTxt};border-radius:8px">
          <div class="m-av" style="background:${t.crActAv};color:${t.crActAvTxt}">S</div>
          <div><div>Sophia</div><div class="m-cr-meta" style="color:${t.crActMeta}">Fitness</div></div>
        </div>
        <div class="m-cr" style="color:${t.crIn}">
          <div class="m-av" style="background:${t.crInAv};color:${t.crInAvTxt}">L</div>
          <div><div style="color:${t.crInName}">Luna</div><div class="m-cr-meta">Lifestyle</div></div>
        </div>
      </div>
      <div class="m-nav" style="border-color:${t.navBdr}">
        <div class="m-nav-i" style="background:${t.niAct};color:${t.niActTxt}"><div class="m-dot" style="background:${t.niDot}"></div>Chat</div>
        <div class="m-nav-i" style="color:${t.niIn}"><div class="m-dot" style="background:${t.niDotIn}"></div>Library</div>
        <div class="m-nav-i" style="color:${t.niIn}"><div class="m-dot" style="background:${t.niDotIn}"></div>Workflows</div>
      </div>
    </div>
    <div class="m-main" style="background:${t.main}">
      <div class="m-chat">
        <div class="m-msg" style="background:${t.botBg};color:${t.botTxt};border:1px solid ${t.botBdr}">
          <strong>Hey!</strong> Ready to create for Sophia.
          <div class="m-imgs">
            <div class="m-img" style="background:${t.img1}"></div>
            <div class="m-img" style="background:${t.img2}"></div>
            <div class="m-img" style="background:${t.img3}"></div>
          </div>
          <div class="m-acts">
            <div class="m-act" style="background:${t.actSec};color:${t.actSecTxt}">Download</div>
            <div class="m-act" style="background:${t.actSec};color:${t.actSecTxt}">Video</div>
            <div class="m-act" style="background:${t.actPri};color:${t.actPriTxt}">Upscale</div>
          </div>
        </div>
        <div class="m-msg usr" style="background:${t.usrBg};color:${t.usrTxt}">gym mirror selfie, lavender set</div>
      </div>
      <div class="m-input" style="border-color:${t.inpBdr};background:${t.inpBg}">
        <div class="m-pills">
          <div class="m-pill" style="background:${t.pillAct};color:${t.pillActTxt}">Chat</div>
          <div class="m-pill" style="color:${t.pillIn}">Image</div>
          <div class="m-pill" style="color:${t.pillIn}">Video</div>
          <div class="m-pill" style="color:${t.pillIn}">Talking Head</div>
        </div>
        <div class="m-irow" style="background:${t.rowBg};border-color:${t.rowBdr}">
          <div class="m-itext" style="color:${t.rowTxt}">What do you want to create?</div>
          <div class="m-send" style="background:${t.sendBg};color:${t.sendTxt}">↑</div>
        </div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════════
// BUILD CARDS
// ════════════════════════════════════════════════════════════════

const grid = document.getElementById('grid');

palettes.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = p.id;
  card.onclick = function(){ sel(this); };

  const tagsHTML = p.tags.map(t =>
    `<span class="tag${t.fav?' fav':''}">${t.t}</span>`
  ).join('');

  const swatchesHTML = p.swatches.map((c,i) =>
    `<div class="sw${i===0?' sw-border':''}" style="background:${c}"><span class="tip">${c} ${p.swLabels[i]}</span></div>`
  ).join('');

  card.innerHTML = `
    <div class="card-top">
      <div class="card-name" style="font-family:${p.fontStack}">${p.name}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-tags">${tagsHTML}</div>
    </div>
    <div class="swatch-bar">${swatchesHTML}</div>
    <div class="mode-row">
      <button class="mode-btn on" style="background:${p.accent};color:#fff;border-color:transparent" onclick="event.stopPropagation();setMode(this,'dark','${p.id}')">Dark</button>
      <button class="mode-btn" onclick="event.stopPropagation();setMode(this,'light','${p.id}')">Light</button>
    </div>
    <div class="mockup" style="font-family:${p.fontStack}" id="mock-${p.id}"></div>
    <div class="card-foot">
      <span class="card-foot-note">${p.font} / ${p.accent}</span>
      <button class="pick-btn" onclick="event.stopPropagation()">This One</button>
    </div>`;

  grid.appendChild(card);

  // Render initial dark mockup
  document.getElementById('mock-'+p.id).innerHTML = buildMockup(p.dark);
});

// ════════════════════════════════════════════════════════════════
// INTERACTIONS
// ════════════════════════════════════════════════════════════════

// Build palette lookup
const PL = {};
palettes.forEach(p => { PL[p.id] = p; });

function setMode(btn, mode, id) {
  const row = btn.parentElement;
  row.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.remove('on');
    b.style.background = 'transparent';
    b.style.color = '#666';
    b.style.borderColor = '#333';
  });
  btn.classList.add('on');
  btn.style.background = PL[id].accent;
  btn.style.color = '#fff';
  btn.style.borderColor = 'transparent';
  document.getElementById('mock-'+id).innerHTML = buildMockup(PL[id][mode]);
}

function sel(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
</script>

</body>
</html>
