<!DOCTYPE html>
<html>
<head>
<title>Wizard Prompt A/B Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #111; color: #fff; padding: 20px; }
h1 { font-size: 24px; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
.creator-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.creator-tab { padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #999; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 200ms; }
.creator-tab:hover { border-color: #555; color: #fff; }
.creator-tab.active { background: #C4603A; border-color: #C4603A; color: #fff; }
.strategy-row { margin-bottom: 24px; }
.strategy-label { font-size: 13px; font-weight: 600; color: #C4603A; margin-bottom: 8px; letter-spacing: 0.5px; }
.strategy-desc { font-size: 11px; color: #666; margin-bottom: 8px; }
.rolls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.roll { border-radius: 10px; overflow: hidden; aspect-ratio: 3/4; background: #222; position: relative; cursor: pointer; transition: transform 200ms; }
.roll:hover { transform: scale(1.02); }
.roll img { width: 100%; height: 100%; object-fit: cover; }
.roll-num { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
.compare-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.compare-col { }
.compare-col h3 { font-size: 12px; color: #C4603A; margin-bottom: 6px; text-align: center; }
.winner-bar { margin-top: 24px; padding: 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; }
.winner-bar h3 { font-size: 14px; margin-bottom: 8px; }
.winner-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.winner-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #444; background: #222; color: #ccc; cursor: pointer; font-size: 12px; transition: all 200ms; }
.winner-btn:hover { border-color: #C4603A; color: #fff; }
.winner-btn.selected { background: #C4603A; border-color: #C4603A; color: #fff; }
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; cursor: pointer; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
</style>
</head>
<body>

<h1>Wizard Prompt A/B Test</h1>
<p class="subtitle">6 creators x 4 strategies x 4 rolls = 96 images. Click any image to enlarge. Pick the winner per creator.</p>

<div class="creator-tabs" id="tabs"></div>
<div id="content"></div>

<div class="winner-bar">
  <h3>Which strategy wins for this creator?</h3>
  <div class="winner-btns" id="winner-btns">
    <button class="winner-btn" onclick="pickWinner('A')">A: Current</button>
    <button class="winner-btn" onclick="pickWinner('B')">B: Full Realism</button>
    <button class="winner-btn" onclick="pickWinner('C')">C: Attractiveness++</button>
    <button class="winner-btn" onclick="pickWinner('D')">D: Hybrid</button>
  </div>
  <div id="verdicts" style="margin-top:12px;font-size:12px;color:#888"></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
const creators = ["sienna", "valentina", "jordyn", "nara", "camila", "marcus"];
const strategies = [
  { id: "A-current", label: "A: Current", desc: "Exact app behavior today (buildWizardPrompt → wrapWithSilhouette)" },
  { id: "B-full-realism", label: "B: Full Realism", desc: "Added 6 realism anchors (stray hairs, fabric texture, skin texture, lighting, shadows)" },
  { id: "C-attractiveness", label: "C: Attractiveness++", desc: "Added heavy gorgeous language (stops you mid-scroll, absolutely stunning)" },
  { id: "D-hybrid", label: "D: Hybrid", desc: "Selective realism + gorgeous language combined" },
];

let activeCreator = "sienna";
const verdicts = {};

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = creators.map(c =>
    `<div class="creator-tab ${c === activeCreator ? 'active' : ''}" onclick="switchCreator('${c}')">${c.charAt(0).toUpperCase() + c.slice(1)}${verdicts[c] ? ' ✓' : ''}</div>`
  ).join("");
}

function switchCreator(name) {
  activeCreator = name;
  renderTabs();
  renderContent();
}

function renderContent() {
  const content = document.getElementById("content");
  const basePath = "/wizard-prompt-test";

  content.innerHTML = `<div class="compare-grid">${strategies.map(s => `
    <div class="compare-col">
      <h3>${s.label}</h3>
      <div style="font-size:10px;color:#555;margin-bottom:8px;text-align:center">${s.desc}</div>
      ${[1,2,3,4].map(i => `
        <div class="roll" style="margin-bottom:8px" onclick="openLightbox('${basePath}/${activeCreator}/${s.id}/roll-${i}.jpg')">
          <img src="${basePath}/${activeCreator}/${s.id}/roll-${i}.jpg" loading="lazy" onerror="this.parentElement.style.background='#333'">
          <div class="roll-num">${i}</div>
        </div>
      `).join("")}
    </div>
  `).join("")}</div>`;
}

function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("open");
}

function pickWinner(letter) {
  verdicts[activeCreator] = letter;
  document.querySelectorAll(".winner-btn").forEach(b => b.classList.remove("selected"));
  event.target.classList.add("selected");
  renderTabs();
  updateVerdicts();
}

function updateVerdicts() {
  const el = document.getElementById("verdicts");
  const lines = Object.entries(verdicts).map(([c, v]) => `${c}: ${v}`);
  el.textContent = lines.length ? "Votes: " + lines.join(" | ") : "";
}

renderTabs();
renderContent();
</script>
</body>
</html>
